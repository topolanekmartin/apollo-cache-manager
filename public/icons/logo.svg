<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#13111c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>

  <!-- Subtle outer glow -->
  <rect width="128" height="128" rx="28" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>

  <!-- Apollo "A" shape / rocket silhouette -->
  <path d="M64 22 L40 98 L50 98 L56 78 L72 78 L78 98 L88 98 Z"
        fill="url(#accentGrad)" fill-opacity="0.15"/>
  <path d="M64 22 L40 98 L50 98 L56 78 L72 78 L78 98 L88 98 Z"
        stroke="url(#accentGrad)" stroke-width="2.5" stroke-linejoin="round" fill="none"/>

  <!-- Cache layer 1 (top) - ellipse crossing the A -->
  <ellipse cx="64" cy="56" rx="16" ry="4.5"
           fill="#7c3aed" fill-opacity="0.25" stroke="#a78bfa" stroke-width="1.8"/>

  <!-- Cache layer 2 (middle) -->
  <ellipse cx="64" cy="67" rx="19" ry="4.5"
           fill="#7c3aed" fill-opacity="0.2" stroke="#a78bfa" stroke-width="1.8"/>

  <!-- Cache layer 3 (bottom - the A crossbar area) -->
  <ellipse cx="64" cy="78" rx="22" ry="4.5"
           fill="#7c3aed" fill-opacity="0.15" stroke="#a78bfa" stroke-width="1.8"/>

  <!-- Vertical connectors between cache layers -->
  <line x1="48" y1="56" x2="42" y2="78" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="80" y1="56" x2="86" y2="78" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Rocket tip accent -->
  <circle cx="64" cy="22" r="2.5" fill="#a78bfa" fill-opacity="0.8"/>
</svg>
